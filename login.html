<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0b0f1a" />
  <title>Login · Pulsantiera Sanremo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <section class="auth-gate">
    <div class="auth-card">
      <div class="auth-logo" aria-hidden="true">
        <img src="./assets/3EF2E05C-D576-407F-B92F-406F1C76FFE8.PNG" alt="" />
      </div>
      <h1 class="auth-title">Pulsantiera Sanremo</h1>
      <p class="muted auth-sub">Accedi con username e scegli la serata da giocare.</p>

      <form id="loginForm" class="auth-form">
        <label class="field">
          <span class="field-label">Username</span>
          <input id="usernameInput" class="input" maxlength="24" placeholder="Es. vale89" required />
        </label>

        <label class="field">
          <span class="field-label">Serata</span>
          <select id="serataSelect" class="input fancy-select" required>
            <option value="1">Serata 1</option>
            <option value="2">Serata 2</option>
            <option value="3">Serata 3</option>
            <option value="4">Serata 4</option>
            <option value="5">Finale (Serata 5)</option>
          </select>
        </label>

        <button class="primary auth-btn" type="submit">Entra</button>
      </form>

      <p id="authStatus" class="muted small auth-status"></p>
    </div>
  </section>

  <script src="./firebase-config.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js" defer></script>
  <script src="./login.js" defer></script>
</body>
</html>
